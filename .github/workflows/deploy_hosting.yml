name: Deploy Hosting

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  deploy-hosting:
    name: Deploy Hosting (Privacy Policy + App Links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject SHA-256 Fingerprint into assetlinks.json
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ ANDROID_KEYSTORE_BASE64 未設定！App Links 驗證將失敗。"
            echo "   請至 GitHub Secrets 設定 ANDROID_KEYSTORE_BASE64 / ANDROID_STORE_PASSWORD / ANDROID_KEY_ALIAS"
            exit 1
          fi

          # 解碼 keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.jks

          # 從 keystore 提取 SHA-256 fingerprint（keytool 為 JRE 標準工具，Ubuntu runner 內建）
          SHA256=$(keytool -list -v \
            -keystore /tmp/release.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            2>/dev/null \
            | grep "SHA256:" \
            | awk '{print $2}')

          rm /tmp/release.jks

          if [ -z "$SHA256" ]; then
            echo "❌ 無法從 keystore 提取 SHA-256，請確認 STORE_PASSWORD / KEY_ALIAS 正確"
            exit 1
          fi

          echo "✅ SHA-256: $SHA256"

          # 覆寫 assetlinks.json（repo 中的 placeholder → 真實 fingerprint）
          # 此檔案僅在 CI deploy 時有真實值，repo 本身保留 placeholder 避免意外洩漏
          python3 - <<PYEOF
          import json

          content = [
            {
              "relation": ["delegate_permission/common.handle_all_urls"],
              "target": {
                "namespace": "android_app",
                "package_name": "com.magicsticker.magic_sticker",
                "sha256_cert_fingerprints": ["$SHA256"]
              }
            }
          ]

          with open("public/.well-known/assetlinks.json", "w") as f:
            json.dump(content, f, indent=2)
            f.write("\n")

          print("✅ assetlinks.json 已注入真實 fingerprint")
          PYEOF

      - name: Inject Apple Team ID into apple-app-site-association
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "⚠️  APPLE_TEAM_ID not set — apple-app-site-association 將保留 placeholder，Universal Links 無法通過 iOS 驗證"
            exit 0
          fi

          python3 - <<PYEOF
          import json, os

          team_id = os.environ["APPLE_TEAM_ID"]
          content = {
            "applinks": {
              "apps": [],
              "details": [
                {
                  "appID": f"{team_id}.com.magicsticker.magic_sticker",
                  "paths": ["/c/*"]
                }
              ]
            }
          }

          with open("public/.well-known/apple-app-site-association", "w") as f:
            json.dump(content, f, indent=2)
            f.write("\n")

          print(f"✅ apple-app-site-association 已注入 Team ID: {team_id}")
          PYEOF

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
