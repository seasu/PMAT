name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
  workflow_dispatch:
    inputs:
      release_notes:
        description: '部署說明（選填）'
        required: false
        default: ''

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install Functions dependencies
        run: cd functions && npm install

      - name: Generate functions/.env from GitHub Variables
        run: |
          cat > functions/.env <<EOF
          GEMINI_TEXT_MODEL=${{ vars.GEMINI_TEXT_MODEL || 'gemini-2.0-flash-lite' }}
          GEMINI_IMAGE_MODEL=${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}
          DOMAIN_BASE=${{ vars.DOMAIN_BASE || 'https://magic-sticker-8eaf4.web.app' }}
          EOF
          sed -i 's/^[[:space:]]*//' functions/.env
          echo "Generated functions/.env:"
          cat functions/.env

      - name: Build Functions
        run: cd functions && npm run build

      # Firebase defineSecret() 會在部署時要求 secret 已存在於 Secret Manager。
      # 非互動式 CI 無法提示輸入，在 Deploy 前用 gcloud 直接建立/更新 secret version。
      # 所需 GitHub Secrets：
      #   APP_STORE_KEY_ID      — App Store Connect API Key 的 Key ID（10 字元）
      #   APP_STORE_CONNECT_ISSUER_ID — App Store Connect Issuer ID（UUID）
      #   APP_STORE_CONNECT_API_KEY   — .p8 私鑰完整內容（含 BEGIN/END PRIVATE KEY 標頭）
      #   （Firebase Secret Manager 內部名稱為 APP_STORE_KEY_ID / APP_STORE_ISSUER_ID /
      #     APP_STORE_PRIVATE_KEY，由下方 provision_secret 對應寫入）
      #
      # ⚠️  若 CI 報 secretmanager.versions.add PERMISSION_DENIED，請在 GCP Console：
      #      IAM & Admin → IAM → firebase-adminsdk-fbsvc@<project>.iam.gserviceaccount.com
      #      → 新增角色：Secret Manager Admin (roles/secretmanager.admin)
      - name: Grant Secret Manager Admin to Firebase SA (idempotent)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json
          gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}
          SA_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/sa.json'))['client_email'])")
          gcloud projects add-iam-policy-binding ${{ secrets.FIREBASE_PROJECT_ID }} \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="roles/secretmanager.admin" \
            --condition=None \
            2>&1 && echo "✅ roles/secretmanager.admin granted" \
                 || echo "⚠️  IAM grant failed — please grant roles/secretmanager.admin manually in GCP Console"
          rm -f /tmp/sa.json

      - name: Provision Firebase Secrets via gcloud
        env:
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json
          gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}
          PROJECT=${{ secrets.FIREBASE_PROJECT_ID }}

          provision_secret() {
            local NAME="$1"
            local VALUE="$2"
            # 確保 Secret Manager 中的 secret 存在（Firebase deploy 需要此 secret 存在才不會報錯）
            gcloud secrets describe "$NAME" --project="$PROJECT" > /dev/null 2>&1 || \
              gcloud secrets create "$NAME" --replication-policy="automatic" --project="$PROJECT"
            if [ -z "$VALUE" ]; then
              # GitHub Secret 未設定：若 Secret Manager 中已有 version 則不動，
              # 否則加入 placeholder 讓 Firebase deploy 不會因「no value」中止。
              NVER=$(gcloud secrets versions list "$NAME" --project="$PROJECT" \
                       --format="value(name)" 2>/dev/null | wc -l)
              if [ "$NVER" -eq 0 ]; then
                echo "⚠️  $NAME not configured — adding placeholder (set real value in GitHub Secrets)"
                printf '%s' "NOT_CONFIGURED" | \
                  gcloud secrets versions add "$NAME" --data-file=- --project="$PROJECT"
              else
                echo "ℹ️  $NAME GitHub secret not set — existing Secret Manager version retained"
              fi
            else
              printf '%s' "$VALUE" | gcloud secrets versions add "$NAME" --data-file=- --project="$PROJECT"
              echo "✅ $NAME provisioned"
            fi
          }

          provision_secret GEMINI_API_KEY       "$GEMINI_API_KEY"
          provision_secret APP_STORE_KEY_ID     "$APP_STORE_KEY_ID"
          provision_secret APP_STORE_ISSUER_ID  "$APP_STORE_ISSUER_ID"
          provision_secret APP_STORE_PRIVATE_KEY "$APP_STORE_PRIVATE_KEY"

          rm -f /tmp/sa.json

      - name: Deploy Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --force --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Grant firebaserules.admin to SA (idempotent)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json
          gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}
          SA_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/sa.json'))['client_email'])")
          gcloud projects add-iam-policy-binding ${{ secrets.FIREBASE_PROJECT_ID }} \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="roles/firebaserules.admin" \
            --condition=None \
            2>&1 && echo "✅ roles/firebaserules.admin granted" || echo "⚠️  IAM grant failed (may already exist or SA lacks resourcemanager.projectIamAdmin)"

      - name: Deploy Firestore Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set Cloud Run IAM (allUsers invoker)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json
          gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}
          for SVC in generatestickerspecs generatestickerimage verifypropurchase fulfillcreditpurchase getconfig; do
            gcloud run services add-iam-policy-binding "$SVC" \
              --region=asia-east1 --member=allUsers --role=roles/run.invoker \
              2>&1 || echo "⚠️  IAM binding failed for $SVC (may not exist yet, skipping)"
          done
          rm /tmp/sa.json

      - name: Smoke test — verify Cloud Functions are live
        run: |
          REGION="asia-east1"
          PROJECT="${{ secrets.FIREBASE_PROJECT_ID }}"
          URL="https://${REGION}-${PROJECT}.cloudfunctions.net/getConfig"

          echo "🔍 Calling getConfig: $URL"

          MAX_RETRY=5
          WAIT=15
          RESP=""
          HTTP_STATUS=""

          for i in $(seq 1 $MAX_RETRY); do
            RAW=$(curl -s -o /tmp/cf_resp.json -w "%{http_code}" \
              -X POST "$URL" \
              -H "Content-Type: application/json" \
              -d '{"data":{}}' \
              --max-time 30) || RAW="000"
            HTTP_STATUS="$RAW"
            RESP=$(cat /tmp/cf_resp.json 2>/dev/null || echo "")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ HTTP 200 on attempt $i"
              break
            fi

            echo "⏳ Attempt $i/$MAX_RETRY — HTTP $HTTP_STATUS, body: $RESP"
            if [ "$i" -lt "$MAX_RETRY" ]; then
              echo "   Waiting ${WAIT}s for IAM propagation..."
              sleep $WAIT
              WAIT=$((WAIT + 10))
            else
              echo "❌ getConfig unreachable after $MAX_RETRY attempts (last HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

          echo "📦 Response: $RESP"

          TEXT_MODEL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['textModel'])" 2>/dev/null)
          IMAGE_MODEL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['imageModel'])" 2>/dev/null)
          FN_VERSION=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['functionsVersion'])" 2>/dev/null)

          if [ -z "$TEXT_MODEL" ] || [ -z "$IMAGE_MODEL" ]; then
            echo "❌ getConfig returned unexpected format"
            echo "$RESP"
            exit 1
          fi

          echo "✅ Cloud Functions alive"
          echo "   Functions version: $FN_VERSION"
          echo "   Text model:        $TEXT_MODEL"
          echo "   Image model:       $IMAGE_MODEL"
