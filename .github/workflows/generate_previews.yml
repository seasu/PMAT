name: Generate Style×Emotion Preview Images

# 手動觸發，產生每種風格搭配各情緒的示意圖（12 種風格 × 24 種情感 = 288 張）。
# Prompt 與 App 實際產圖（_buildSinglePrompt，圓形 + Chroma Key 模式）完全一致。

on:
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: '強制重新生成（即使圖片已存在）'
        type: boolean
        default: false
      styles:
        description: |
          只產生指定風格（空格分隔，留空=全部 12 種）
          可用值：chibi | popArt | pixel | sketch | watercolor | webtoon | celshade | pixar3d | plush | yuruDoodle | showaManga | claymation
        type: string
        default: ''
      emotions:
        description: |
          只產生指定情感（空格分隔，留空=全部 24 種）
          可用值：greeting | praise | surprise | awkward | angry | happy | thinking | farewell | shy | cool | tired | cry | love | excited | scared | mischief | sleepy | beg | worried | hungry | celebrate | no | encourage | pain
        type: string
        default: ''

jobs:
  generate:
    name: Generate Preview Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if images already exist
        id: check
        run: |
          INPUT_STYLES="${{ github.event.inputs.styles }}"
          INPUT_EMOTIONS="${{ github.event.inputs.emotions }}"
          ALL_STYLES="chibi popArt pixel sketch watercolor webtoon celshade pixar3d plush yuruDoodle showaManga claymation"
          ALL_EMOTIONS="greeting praise surprise awkward angry happy thinking farewell shy cool tired cry love excited scared mischief sleepy beg worried hungry celebrate no encourage pain"

          # 手動觸發：用輸入值；自動觸發（sticker_style.dart 變動）：只補缺圖的風格
          if [ -n "$INPUT_STYLES" ]; then
            STYLES="$INPUT_STYLES"
          elif [ "${{ github.event_name }}" = "push" ]; then
            # 自動偵測缺少 greeting 圖片（代表整組都未產生）的風格
            MISSING_STYLES=""
            for s in $ALL_STYLES; do
              if [ ! -f "assets/images/preview_${s}_greeting.webp" ]; then
                MISSING_STYLES="$MISSING_STYLES $s"
              fi
            done
            STYLES=$(echo $MISSING_STYLES | xargs)
            if [ -z "$STYLES" ]; then
              echo "✅ All styles have preview images. Nothing to generate."
              echo "needs_generation=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "🔍 Auto-detected missing styles: $STYLES"
          else
            STYLES="$ALL_STYLES"
          fi

          EMOTIONS="${INPUT_EMOTIONS:-$ALL_EMOTIONS}"

          MISSING=0
          for s in $STYLES; do
            for e in $EMOTIONS; do
              if [ ! -f "assets/images/preview_${s}_${e}.webp" ] || \
                 [ "${{ github.event.inputs.force_regenerate }}" = "true" ]; then
                MISSING=1
                break 2
              fi
            done
          done

          echo "needs_generation=$MISSING" >> "$GITHUB_OUTPUT"
          echo "resolved_styles=$STYLES" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.check.outputs.needs_generation == '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.needs_generation == '1'
        run: pip install google-genai numpy pillow -q

      - name: Generate style×emotion preview images
        if: steps.check.outputs.needs_generation == '1'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL || 'gemini-2.5-flash-image' }}
          PREVIEW_STYLES: ${{ steps.check.outputs.resolved_styles }}
          PREVIEW_EMOTIONS: ${{ github.event.inputs.emotions }}
        run: python3 scripts/generate_style_previews_ci.py

      - name: Convert PNG → WebP
        if: steps.check.outputs.needs_generation == '1'
        run: |
          python3 - <<'EOF'
          from pathlib import Path
          from PIL import Image

          assets = Path("assets/images")
          pngs = list(assets.glob("preview_*.png"))
          if not pngs:
              print("No PNG previews found to convert")
              exit(1)

          for png in pngs:
              webp = png.with_suffix(".webp")
              img = Image.open(png)
              img.save(webp, "WEBP", quality=85, method=6)
              orig = png.stat().st_size
              conv = webp.stat().st_size
              print(f"✅ {png.name} → {webp.name}  {orig//1024}KB → {conv//1024}KB")
              png.unlink()
          EOF

      - name: Create PR with generated images
        if: steps.check.outputs.needs_generation == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/preview_*.webp
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # 遞增版號（patch +1, build +1）以通過 Version Guard
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          MAJOR_MINOR=$(echo "$CURRENT" | sed 's/\([0-9]*\.[0-9]*\.\)\([0-9]*\)+\([0-9]*\)/\1/')
          PATCH=$(echo "$CURRENT" | sed 's/[0-9]*\.[0-9]*\.\([0-9]*\)+.*/\1/')
          BUILD=$(echo "$CURRENT" | sed 's/.*+//')
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD + 1))
          NEW_VER="${MAJOR_MINOR}${NEW_PATCH}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_VER}/" pubspec.yaml
          sed -i "s/| 目前版本 | v[^ ]* |/| 目前版本 | v${NEW_VER} |/" PRD.md
          git add pubspec.yaml PRD.md
          echo "📦 Version bumped: $CURRENT → $NEW_VER"

          BRANCH="auto/style-emotion-previews-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "feat: add AI-generated style×emotion preview images (v${NEW_VER})"
          git push origin "$BRANCH"
          PR_BODY=$(printf '由 **Generate Style×Emotion Preview Images** workflow 自動產生。\n\n包含 12 種風格 × 24 種情感 = 288 張示意圖（preview_{style}_{emotion}.webp）。\n\nPrompt 格式與 App 實際產圖（_buildSinglePrompt，圓形 + Chroma Key 模式）完全一致，示意圖呈現效果忠實反映正式貼圖風格。')
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: add AI-generated style x emotion preview images" \
            --body "$PR_BODY"
          echo "✅ PR created from branch $BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip message
        if: steps.check.outputs.needs_generation == '0'
        run: echo "✅ All preview images already exist. Use force_regenerate=true to regenerate."
