name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Version Guard (App)
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if app code changed
        id: app_changed
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only origin/main..HEAD \
            -- 'lib/' 'android/' 'ios/' 'pubspec.yaml' 'pubspec.lock' \
            2>/dev/null || echo "")
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "ℹ️  App 有改動，執行版本守衛"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  App 無改動，跳過版本守衛"
          fi

      - name: Check pubspec version is bumped
        if: steps.app_changed.outputs.changed == 'true'
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "Current version: $CURRENT"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LAST_TAG" != "none" ]; then
            TAGGED_VER=$(git show "$LAST_TAG":pubspec.yaml | grep '^version:' | awk '{print $2}')
            if [ "$CURRENT" = "$TAGGED_VER" ]; then
              echo "❌ pubspec.yaml version ($CURRENT) 未遞增（上次 tag: $TAGGED_VER）"
              exit 1
            fi
          fi
          echo "✅ Version OK: $CURRENT"

      # 向 GitHub Commit Status API 回報 "Version Guard" 狀態，
      # 以滿足 Branch Protection 的 required check（名稱必須完全對應）。
      - name: Report "Version Guard" commit status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          STATE=$([ "$JOB_STATUS" = "success" ] && echo "success" || echo "failure")
          echo "Posting Version Guard → ${STATE} for ${SHA}"
          HTTP=$(curl -s -o /tmp/status_resp.json -w "%{http_code}" --connect-timeout 10 --max-time 30 -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${REPO}/statuses/${SHA}" \
            -d "{\"state\":\"${STATE}\",\"context\":\"Version Guard\",\"description\":\"App version guard\"}")
          cat /tmp/status_resp.json
          echo "HTTP: ${HTTP}"
          [ "$HTTP" = "201" ] && echo "✅ Version Guard status posted" || (echo "❌ Failed to post status" && exit 1)

  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    needs: version-check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if app code changed
        id: app_changed
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only origin/main..HEAD \
            -- 'lib/' 'android/' 'ios/' 'pubspec.yaml' 'pubspec.lock' \
            2>/dev/null || echo "")
          echo "changed=$([ -n "$CHANGED" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        if: steps.app_changed.outputs.changed == 'true'
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        if: steps.app_changed.outputs.changed == 'true'
        with:
          flutter-version: '3.29.1'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        if: steps.app_changed.outputs.changed == 'true'
        run: flutter pub get

      - name: Dart analyze
        if: steps.app_changed.outputs.changed == 'true'
        run: dart analyze --fatal-infos

      - name: Flutter test
        if: steps.app_changed.outputs.changed == 'true'
        run: flutter test

      - name: Skip (no app changes)
        if: steps.app_changed.outputs.changed != 'true'
        run: echo "ℹ️  App 無改動，跳過 analyze & test"

  functions-check:
    name: Cloud Functions Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install dependencies
        run: cd functions && npm install

      - name: TypeScript compile check
        run: cd functions && npx tsc --noEmit

      - name: Check if functions changed
        id: fns_changed
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          CHANGED=$(git diff --name-only origin/main..HEAD -- functions/ 2>/dev/null || echo "")
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "ℹ️  Functions 有改動，執行版本守衛"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Functions 無改動，跳過版本守衛"
          fi

      - name: Check functions version bumped
        if: steps.fns_changed.outputs.changed == 'true'
        run: |
          CURRENT=$(node -p "require('./functions/package.json').version")
          MAIN_VER=$(git show origin/main:functions/package.json 2>/dev/null | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('version','0.0.0'))" 2>/dev/null || echo "0.0.0")
          echo "Current: $CURRENT  |  main: $MAIN_VER"
          if [ "$CURRENT" = "$MAIN_VER" ]; then
            echo "❌ functions/package.json version ($CURRENT) 未遞增"
            echo "   修改 functions/ 程式碼時必須同步遞增 package.json version 及 FUNCTIONS_VERSION 常數"
            exit 1
          fi
          echo "✅ Functions version OK: $CURRENT"
